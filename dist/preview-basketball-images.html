<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basketball images (orange-themed)</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #1a1a1a; color: #fff; }
    h1 { margin-bottom: 24px; }
    .grid { display: flex; gap: 24px; flex-wrap: wrap; }
    .card { background: #2a2a2a; padding: 16px; border-radius: 8px; max-width: 400px; }
    .card img { width: 100%; height: auto; display: block; border-radius: 4px; }
    .card p { margin: 12px 0 0; font-size: 14px; color: #b6b6b6; }
  </style>
</head>
<body>
  <h1>Basketball images (run download-topscorer-images.py to fetch)</h1>
  <div class="grid">
    <div class="card">
      <img src="images/topscorer/basketball-rim-sunset.jpg" alt="Basketball rim sunset" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <p style="display:none;">Run script to download</p>
      <p><strong>basketball-rim-sunset.jpg</strong> (used on By Sport page)</p>
    </div>
    <div class="card">
      <img src="images/topscorer/basketball-hoop-orange.jpg" alt="Basketball hoop orange" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <p style="display:none;">Run script to download</p>
      <p><strong>basketball-hoop-orange.jpg</strong></p>
    </div>
    <div class="card">
      <img src="images/topscorer/basketball-lockers.jpg" alt="Basketball lockers" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <p style="display:none;">Run script to download</p>
      <p><strong>basketball-lockers.jpg</strong></p>
    </div>
  </div>
</body>
</html>
