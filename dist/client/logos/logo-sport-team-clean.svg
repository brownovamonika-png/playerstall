      <rect x="0" y="4" width="10" height="40" rx="2" fill="#fe5900"/>
      <rect x="16" y="4" width="10" height="40" rx="2" fill="#fe5900"/>
    </g>
  </defs>
  <use href="#locker-icon"/>
  <text x="42" y="34" font-family="Oswald, sans-serif" font-size="28" font-weight="600" fill="currentColor" text-anchor="start" letter-spacing="0.05em">PLAYERSTALL</text>
</svg>
