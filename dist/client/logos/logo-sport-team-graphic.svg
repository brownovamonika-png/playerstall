<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100" aria-label="PlayerStall">
  <defs>
    <!-- Orange gradient for graphic punch -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b1a"/>
      <stop offset="100%" style="stop-color:#fe5900"/>
    </linearGradient>
    <!-- Subtle shadow for depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
    <!-- Locker icon with gradient -->
    <g id="locker-icon-graphic">
      <rect x="0" y="8" width="14" height="72" rx="3" fill="url(#orangeGrad)" filter="url(#softShadow)"/>
      <rect x="22" y="8" width="14" height="72" rx="3" fill="url(#orangeGrad)" filter="url(#softShadow)"/>
    </g>
  </defs>
  <use href="#locker-icon-graphic"/>
  <text x="48" y="58" font-family="Oswald, sans-serif" font-size="36" font-weight="700" fill="#1a1a1a" text-anchor="start" letter-spacing="0.08em">PLAYERSTALL</text>
  <!-- Accent line under wordmark -->
  <rect x="48" y="68" width="120" height="4" rx="2" fill="url(#orangeGrad)"/>
</svg>
